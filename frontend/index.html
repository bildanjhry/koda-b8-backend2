<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
	<script src="https://code.jquery.com/jquery-4.0.0.slim.js"
		integrity="sha256-M+GjhMBfXikM1izMplICCTscIj5hzPCp6uDzaypxtgg=" crossorigin="anonymous"></script>
	<title>Auth</title>
</head>

<body>
	<div class="container">
		<div class="wrapper">
			<h1>Login</h1>
			<div class="alert-display">

			</div>
			<form class="form-login">
				<div class="input-wrapper">
					<label for="email" class="email-label">
						Email
					</label>
					<input type="email" name="email" value="" id="email" class="input-block">
				</div>
				<div class="input-wrapper">
					<label for="password" class="password-label">
						Password
					</label>
					<input type="password" name="password" value="" id="password" class="input-block">
				</div>
				<div>
					<button type="submit" class="btn-submit">
						Login
					</button>
				</div>
				<div class="register-wrapper">
					<p>Do not have account yet?</p>
					<a href="/frontend/register.html">Register</a>
				</div>
			</form>
		</div>
	</div>

	<script type="module" src="./buss-logic/login-action.js"></script>
</body>

</html>
